plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader ->
        localProperties.load(reader)
    }
}

def kakaoNativeAppKey = localProperties.getProperty("kakao.native.app.key")
if (kakaoNativeAppKey == null) {
    throw new GradleException("kakao.native.app.key is missing in local.properties")
}

def naverClientId = localProperties.getProperty("naver.client.id")
if (naverClientId == null) {
    throw new GradleException("naver.client.id is missing in local.properties")
}

android {
    namespace = "com.just.twelve.more.picple"
    compileSdk = 36
    ndkVersion = "27.0.12077973"

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "com.just.twelve.more.picple"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdkVersion = flutter.minSdkVersion
        targetSdk = 36
        versionCode = flutter.versionCode
        versionName = flutter.versionName

        resValue(
            "string",
            "KAKAO_NATIVE_APP_KEY",
            kakaoNativeAppKey
        )
        resValue(
            "string",
            "NAVER_CLIENT_ID",
            naverClientId
        )
    }

    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig = signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}
